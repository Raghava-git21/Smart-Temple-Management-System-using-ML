<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Temple - Admin Console</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.1">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="centered-layout">

    <!-- Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="top-bar">
        <div class="status-badge">
            <span class="status-pulse"></span>
            System Live
        </div>
        <div class="center-content">
            <span id="temple-display-name" style="font-weight: 700; color: var(--accent-primary); letter-spacing: 1px;">Temple Admin</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="clock-display">
                <i class="fa-regular fa-clock"></i>
                <span id="current-time">00:00:00</span>
            </div>
            <button id="logout-btn" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-power-off"></i> Logout
            </button>
        </div>
    </div>

    <div class="portal-container glass-panel">
        <div class="portal-header">
            <div class="logo">
                <i class="fa-solid fa-place-of-worship"></i>
            </div>
            <h1>Smart Temple Admin</h1>
            <p>Welcome back! manage your systems</p>

            <div id="role-selector-container" class="selector-container" style="margin-top: 20px; text-align: left;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-secondary);">Select Temple to Manage</label>
                <select id="temple-select" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; outline: none;">
                    <option value="">Loading temples...</option>
                </select>
                <button id="add-new-temple-btn" style="width: 100%; margin-top: 10px; padding: 10px; border: 1px dashed var(--accent-primary); background: transparent; color: var(--accent-primary); border-radius: 10px; cursor: pointer; font-weight: 600;">
                    <i class="fa-solid fa-plus"></i> Add New Temple
                </button>
            </div>
        </div>

        <div id="management-ui" style="display: none;">
            <!-- Integrated External Modules -->
            <div class="button-grid">
                <!-- Button 1: Temple Counter -->
                <a id="module-counter" href="#" target="_blank" class="glass-button">
                    <div class="btn-icon">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div class="btn-text">
                        <h3>Temple Counter</h3>
                        <span>Manage real-time devotee limits</span>
                    </div>
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                </a>

                <!-- Button 2: Parking Management -->
                <a id="module-parking" href="#" target="_blank" class="glass-button">
                    <div class="btn-icon">
                        <i class="fa-solid fa-square-parking"></i>
                    </div>
                    <div class="btn-text">
                        <h3>Parking CCTV</h3>
                        <span>Monitor available slots</span>
                    </div>
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                </a>

                <!-- Button 3: Camera Manager -->
                <a id="module-camera" href="#" target="_blank" class="glass-button">
                    <div class="btn-icon">
                        <i class="fa-solid fa-video"></i>
                    </div>
                    <div class="btn-text">
                        <h3>Camera Manager</h3>
                        <span>Add/Edit RTSP Sources</span>
                    </div>
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                </a>
            </div>

            <!-- Management Section -->
            <div class="management-section" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-family: 'Clash Display'; font-size: 1.5rem; color: #fff;">Temple Management</h2>
                    <button id="save-settings-btn" class="glass-button" style="padding: 10px 20px; font-size: 0.9rem; background: var(--accent-primary); color: #000; border: none; margin: 0;">
                        <i class="fa-solid fa-save"></i> Save All Changes
                    </button>
                </div>

                <!-- Temple Profile Card -->
                <div id="role-profile-card" class="settings-card glass-panel" style="margin-bottom: 20px; padding: 20px;">
                    <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: var(--accent-primary);">
                        <i class="fa-solid fa-id-card"></i> Temple Profile
                    </h3>
                    <div class="profile-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left;">
                        <div class="input-group">
                            <label>Temple Name</label>
                            <input type="text" id="profile-name">
                        </div>
                        <div class="input-group">
                            <label>Location</label>
                            <input type="text" id="profile-location">
                        </div>
                        <div class="input-group" style="grid-column: span 2;">
                            <label>Image URL</label>
                            <input type="text" id="profile-image">
                        </div>
                        <div class="input-group">
                            <label>Latitude</label>
                            <input type="text" id="profile-lat">
                        </div>
                        <div class="input-group">
                            <label>Longitude</label>
                            <input type="text" id="profile-lng">
                        </div>
                        <div class="input-group" style="grid-column: span 2;">
                            <label>Manual Parking Spots (Baseline Available)</label>
                            <input type="number" id="parking-manual-spots" placeholder="e.g. 15">
                        </div>
                    </div>
                    <div class="module-urls" style="margin-top: 15px; display: grid; gap: 10px; text-align: left;">
                        <div class="input-group"><label>Counter API URL</label><input type="text" id="url-counter"></div>
                        <div class="input-group"><label>Parking Map URL</label><input type="text" id="url-parking"></div>
                        <div class="input-group"><label>Camera Manager URL</label><input type="text" id="url-camera"></div>
                    </div>
                </div>

                <div id="role-details-container" class="settings-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;">
                    <!-- Timings -->
                    <div class="settings-card glass-panel" style="padding: 15px;">
                        <h3 style="margin-bottom: 10px; font-size: 1.1rem; color: var(--accent-primary);">Timings</h3>
                        <div id="timing-inputs"></div>
                        <button class="add-btn" onclick="addTimingField()" style="margin-top: 10px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); color: #fff; width: 100%; padding: 8px; border-radius: 8px; cursor: pointer;">+ Add Timing</button>
                    </div>

                    <!-- Facilities -->
                    <div class="settings-card glass-panel" style="padding: 15px;">
                        <h3 style="margin-bottom: 10px; font-size: 1.1rem; color: var(--accent-primary);">Facilities</h3>
                        <div id="facility-inputs" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                        <button class="add-btn" onclick="addFacilityField()" style="margin-top: 10px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); color: #fff; width: 100%; padding: 8px; border-radius: 8px; cursor: pointer;">+ Add Facility</button>
                    </div>

                    <!-- Manual Routes -->
                    <div class="settings-card glass-panel" style="padding: 15px; grid-column: span 2;">
                        <h3 style="margin-bottom: 10px; font-size: 1.1rem; color: var(--accent-primary);">Manual Routes</h3>
                        <div id="route-inputs"></div>
                        <button class="add-btn" onclick="addRouteField()" style="margin-top: 10px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); color: #fff; width: 100%; padding: 8px; border-radius: 8px; cursor: pointer;">+ Add Route</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box; }
    </style>

    <script src="app.js?v=1.3"></script>
</body>
</html>
